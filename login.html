<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      .outer-box {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgb(11, 2, 54);
      }
      .heading {
        color: white;
      }   
      .small-text {
        color: white;
        text-decoration: none;
      }    
      .card {
        display: flex;
        flex-direction: column;
        background-color: rgb(3, 7, 50);
        height: 70vh;
        padding: 20px;
        border-radius: 10px;
        justify-content: center;
        align-items: center;
      }  
      .both-card {
        background-color: rgb(20, 5, 97);
        margin: 20px;
        border-radius: 10px;
        padding: 20px;
      }  
    </style>
</head>

<body>
  <div class="outer-box">
    <div class="container-xxl">
        <div class="container text-center">
  <div class="both-card">
      <div class="row">
    <div class="col">
      <div>
        <img src="https://plus.unsplash.com/premium_photo-1674764005310-e87828ef0180?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDI3fGlVSXNuVnRqQjBZfHxlbnwwfHx8fHw%3D" alt="Login Image" class="img-fluid" style="border-radius: 10px; height: 70vh;">
      </div>
    </div>
    <div class="col">
      <div class="card">
    <form>
    <h1 class="heading">Create an account</h1>
    <p class="small-text">Already have an account? <a href="#">Log in</a></p>
    <table class="">
        <tr>
            <td><input type="text" placeholder="First name" class="form-control"></td>
            <td><input type="text" placeholder="Last name" class="form-control"></td>
        </tr>
        <tr>
            <td><input type="text" placeholder="Email" class="form-control"></td>
        </tr>
        <tr>
            <td><input type="password" placeholder="Password" class="form-control"></td>
        </tr>
        
    </table>
    <br>
    <input type="checkbox" class="form-check-input">
    <label for="checkDefault" class="small-text">I agree to the <a href="#">Terms & conditions</a></label>
    <br>
    <div class="d-grid gap-2 col-6 mx-auto">
        <button class="btn btn-primary">Create account</button>
    </div>
    <br>
    <p class="small-text">----------Or register with----------</p>
    <div class="d-grid gap-2 col-6 mx-auto">
        <button class="btn btn-outline-secondary">Google</button>
        <button class="btn btn-outline-secondary">Apple</button>
    </div>
</form>
</div>
    </div>
  </div>
  </div>

</div>
</div> 

  </div>
    
</body>
</html>
