<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Promise.all()</h1>
    <button onclick="loadData()">click</button>
    <h2 id="output"></h2>
    <script>
        async function loadData(){
            const output = document.getElementById("output");
            output.innerHTML="loading...";

            const nameApi = await fetch ("https://jsonplaceholder.typicode.com/users/1")
            .then(res => res.json());

            const postApi = await fetch ("https://jsonplaceholder.typicode.com/postss/1")
            .then(res => res.json());

            const commentApi = await fetch ("https://jsonplaceholder.typicode.com/comments/1")
            .then(res => res.json());

            Promise.all([nameApi,postApi,commentApi]).then(results => {
                const [user, post, comment] = results;
                output.innerHTML = `
                <p><strong>Name:</strong> ${user.name}</p>
                <p><strong>Post:</strong> ${post.body}</p>
                <p><strong>Comment:</strong> ${comment.body}</p>
                `;
            }).catch(error => {
                output.innerHTML = `
                <p style="color:red;">Error loading data</p>
                `;
                console.error(error);   

            })
        }
    </script>
</body>
</html>
